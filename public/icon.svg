<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Rounded square bg -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect x="1" y="1" width="62" height="28" rx="13" fill="white" opacity="0.07"/>
  <!-- Chain link — left pill -->
  <rect x="10" y="20" width="22" height="13" rx="6.5" fill="white"/>
  <rect x="16" y="24" width="10" height="5" rx="2.5" fill="#f97316"/>
  <!-- Chain link — right pill -->
  <rect x="32" y="20" width="22" height="13" rx="6.5" fill="white"/>
  <rect x="38" y="24" width="10" height="5" rx="2.5" fill="#f97316"/>
  <!-- Analytics bars -->
  <rect x="11" y="41" width="7" height="11" rx="2.5" fill="white" opacity="0.4"/>
  <rect x="22" y="37" width="7" height="15" rx="2.5" fill="white" opacity="0.6"/>
  <rect x="33" y="33" width="7" height="19" rx="2.5" fill="white" opacity="0.85"/>
  <rect x="44" y="36" width="7" height="16" rx="2.5" fill="white" opacity="0.55"/>
</svg>
