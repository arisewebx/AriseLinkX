<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Download OG Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; font-family: system-ui, sans-serif; padding: 24px; }
    img { width: 100%; max-width: 900px; border-radius: 12px; border: 1px solid #1e293b; }
    canvas { display: none; }
    button {
      background: #f97316; color: white; border: none; padding: 12px 32px;
      border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #ea6c10; }
    p { color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <img id="preview" src="/og-image.svg" alt="OG Image preview" />
  <canvas id="canvas" width="1200" height="630"></canvas>
  <button onclick="download()">⬇ Download as PNG (1200×630)</button>
  <p>Opens the file in your Downloads folder as og-image.png</p>

  <script>
    function download() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, 1200, 630);
        const a = document.createElement('a');
        a.download = 'og-image.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      };
      // Use blob URL to avoid CORS issues with SVG
      fetch('/og-image.svg')
        .then(r => r.text())
        .then(svg => {
          const blob = new Blob([svg], { type: 'image/svg+xml' });
          img.src = URL.createObjectURL(blob);
        });
    }
  </script>
</body>
</html>
